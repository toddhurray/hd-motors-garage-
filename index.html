<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD Motors & Garage | Harley Parts</title>
  <style>
    :root { --orange: #ff6600; --black: #111; --dark: #1a1a1a; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
    body { background: var(--black); color: #fff; }
    header { background: #000; padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--orange); }
    .logo { height: 50px; }
    .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80'); background-size: cover; padding: 100px 20px; text-align: center; }
    .hero h1 { font-size: 3rem; color: var(--orange); text-shadow: 2px 2px 4px #000; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .parts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
    .part-card { background: var(--dark); border: 1px solid #333; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
    .part-card:hover { transform: translateY(-5px); border-color: var(--orange); }
    .part-img { width: 100%; height: 250px; object-fit: cover; }
    .part-info { padding: 20px; }
    .part-price { color: var(--orange); font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
    .btn { display: inline-block; background: var(--orange); color: #000; padding: 12px 25px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 10px; }
    .filters { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
    .filters select { padding: 10px; background: var(--dark); color: #fff; border: 1px solid #333; border-radius: 5px; }
    footer { background: #000; text-align: center; padding: 30px; margin-top: 60px; border-top: 3px solid var(--orange); }
    @media (max-width: 768px) { .hero h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <header>
    <img src="https://i.ibb.co/6RX5qz3/hd-motors-logo.png" alt="HD Motors & Garage" class="logo">
    <nav>
      <a href="https://www.ebay.com/str/hdmotorsandgarage" class="btn" target="_blank">Visit eBay Store</a>
    </nav>
  </header>

  <section class="hero">
    <h1>HD MOTORS & GARAGE</h1>
    <p>Performance Harley Parts & Accessories</p>
  </section>

  <div class="container">
    <h2>Featured Parts</h2>
    <div class="filters">
      <select id="category-filter">
        <option value="all">All Categories</option>
        <option value="Engine">Engine</option>
        <option value="Exhaust">Exhaust</option>
        <option value="Brakes">Brakes</option>
        <option value="Accessories">Accessories</option>
      </select>
    </div>
    <div class="parts-grid" id="parts-grid"></div>
  </div>

  <footer>
    <p>&copy; 2026 HD Motors & Garage | Texas, USA</p>
    <p><a href="mailto:hdmotorsgarage@gmail.com" style="color:var(--orange)">hdmotorsgarage@gmail.com</a></p>
  </footer>

  <script>
    const parts = [
      {
        id: 1,
        name: "CVO 110 Screamin Eagle Twin Cam Engine - 0 Miles",
        price: 2200,
        category: "Engine",
        fitment: "Touring/Dyna/Softail Twin Cam models",
        desc: "BRAND NEW 110\" CVO Screamin Eagle Twin Cam. Dealer take-off with 0 MILES on odometer. Removed for larger crate engine swap. Includes what you see. $2200 shipped.",
        img: "https://i.postimg.cc/FsNW7KBV/IMG-7267.jpg"
      },
      {
        id: 2,
        name: "Vance & Hines High Output Exhaust w/ Heat Shields",
        price: 450,
        category: "Exhaust",
        fitment: "2023 Road Glide ST / M8 Touring models",
        desc: "Vance & Hines High Output 2-into-1 exhaust with heat shields. Only 2500 miles. Pulled from 2023 Road Glide ST. Black finish. Includes pipe and heat shields. $450 shipped.",
        img: "https://i.postimg.cc/V6Yh2Bb3/IMG-7234.jpg"
      }
    ];

    function renderParts(filter = 'all') {
      const grid = document.getElementById('parts-grid');
      grid.innerHTML = '';
      const filtered = filter === 'all' ? parts : parts.filter(p => p.category === filter);
      filtered.forEach(part => {
        grid.innerHTML += `
          <div class="part-card">
            <img src="${part.img}" alt="${part.name}" class="part-img">
            <div class="part-info">
              <h3>${part.name}</h3>
              <p>${part.fitment}</p>
              <p>${part.desc}</p>
              <div class="part-price">$${part.price}</div>
              <a href="mailto:hdmotorsgarage@gmail.com?subject=Inquiry: ${part.name}" class="btn">Contact to Buy</a>
            </div>
          </div>
        `;
      });
    }

    document.getElementById('category-filter').addEventListener('change', (e) => {
      renderParts(e.target.value);
    });

    renderParts();
  </script>
</body>
</html>
